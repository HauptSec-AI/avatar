<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  (function () {
    var t = localStorage.getItem("avatar-theme");
    if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
  })();
</script>
<title>Talk to my digital twin — Avatar</title>
<link rel="icon" href="/assets/avatar-robot-round.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,18..72,400;0,18..72,500;0,18..72,600;1,18..72,400;1,18..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/tokens.css">
<link rel="stylesheet" href="/components.css">
</head>
<body class="hud-grid">

<header class="topbar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="9.5" cy="13" r="5" fill="var(--blue-strong)"/>
        <circle cx="15.5" cy="13" r="5" stroke="var(--blue-strong)" stroke-width="1.6"/>
        <circle cx="15.5" cy="13" r="1.4" fill="var(--yellow-strong)"/>
      </svg>
    </span>
    <div>
      <div class="brand-name">Avatar</div>
      <div class="brand-sub" id="brandSub">digital twin</div>
    </div>
  </div>
  <div class="topbar-right">
    <label class="name-field" title="Your name or initials">
      <svg class="icon icon--sm" style="color:var(--text-faint)"><use href="/icons.svg#i-visitor"/></svg>
      <input type="text" id="nameInput" placeholder="Your name / initials" autocomplete="off" />
    </label>
    <label class="switch" title="Remember this conversation in your browser">
      <input type="checkbox" id="keepChatToggle" checked>
      <span class="track"><span class="thumb"></span></span>
      <span class="switch-label">Keep chat</span>
    </label>
    <button class="btn btn--ghost btn--sm" id="resetBtn"><svg class="icon icon--sm"><use href="/icons.svg#i-reset"/></svg> Reset</button>
    <span class="divider-v"></span>
    <button class="icon-btn" id="themeToggle" title="Toggle light / dark">
      <svg class="icon icon--sm theme-moon"><use href="/icons.svg#i-moon"/></svg>
      <svg class="icon icon--sm theme-sun" style="display:none"><use href="/icons.svg#i-sun"/></svg>
    </button>
  </div>
</header>

<main class="voice-main">
  <div class="voice-hero" id="voiceHero">
    <div class="avatar avatar-twin" style="background-image:url('/assets/avatar-robot-round.png')"></div>
    <h1 id="heroHeading">Talk to my <em>digital twin</em>.</h1>
    <p id="heroBody">Speak with the twin, in my own voice — and I might just chime in myself.</p>
    <button class="btn btn--primary" id="startCallBtn">
      <svg class="icon"><use href="/icons.svg#i-mic"/></svg> Start talking
    </button>
    <a class="chip voice-switch-hint" href="/"><svg class="icon icon--sm"><use href="/icons.svg#i-arrow-right"/></svg> Prefer to type? Switch to text chat</a>
  </div>

  <div id="voicePanelRoot" style="display:none"></div>
</main>

<script type="module" src="/src/voice.ts"></script>
</body>
</html>
